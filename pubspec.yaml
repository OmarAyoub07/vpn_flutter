name: app
description: "Free Fast VPN"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.4
  url_launcher: ^6.3.2
  image_picker: ^1.2.1
  share_plus: ^12.0.1
  intl: ^0.20.2
  permission_handler: ^12.0.1
  flutter_localizations:
    sdk: flutter
  wireguard_flutter: ^0.1.3
  http: ^1.3.0
  http_parser: ^4.1.2
  uuid: ^4.5.1
  google_mobile_ads: ^5.3.0
  device_info_plus: ^11.3.3
  android_id: ^0.4.0
  flutter_widget_from_html_core: ^0.17.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  image_path_android: "assets/launcher/icon.png"
  adaptive_icon_background: "assets/launcher/background.png"
  adaptive_icon_foreground: "assets/launcher/foreground.png"
  
  ios: true
  image_path_ios: "assets/launcher/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/launcher/icon.png
    - assets/launcher/background.png
    - assets/launcher/foreground.png
    - assets/logo.png
    - assets/symbol.png

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/InterVariable.ttf