name: Flutter iOS Build (IPA)

on:
  push:
    branches:
      - ios/release

jobs:
  build-ios:
    name: Build IPA
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: OmarAyoub07/vpn_flutter
          token: ${{ secrets.REPO_ACCESS_TOKEN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'

      - name: Setup Go (required by WireGuardKit)
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Clone and patch wireguard-apple
        run: |
          git clone --depth 1 https://github.com/WireGuard/wireguard-apple.git ios/wireguard-apple
          # Fix swift-tools-version: 5.3 uses .macOS(.v12)/.iOS(.v15) which require 5.5+
          sed -i '' 's/swift-tools-version:5.3/swift-tools-version:5.9/' ios/wireguard-apple/Package.swift
          # Fix missing sys/types.h include for u_int32_t/u_char (required by newer SDK)
          sed -i '' '1s/^/#include <sys\/types.h>\n/' ios/wireguard-apple/Sources/WireGuardKitC/WireGuardKitC.h
          # Copy wgQuickConfig parser + helper (in Shared, not in WireGuardKit SPM target)
          # Add 'import WireGuardKit' so types are visible from the separate module
          echo 'import WireGuardKit' | cat - ios/wireguard-apple/Sources/Shared/Model/TunnelConfiguration+WgQuickConfig.swift > ios/VPNExtension/TunnelConfiguration+WgQuickConfig.swift
          cp ios/wireguard-apple/Sources/Shared/Model/String+ArrayConversion.swift ios/VPNExtension/

      - name: Build libwg-go.a for iOS
        run: |
          cd ios/wireguard-apple/Sources/WireGuardKitGo
          make PLATFORM_NAME=iphoneos ARCHS=arm64
          make version-header PLATFORM_NAME=iphoneos ARCHS=arm64

      - name: Migrate to UIScene lifecycle
        run: flutter config --enable-uiscene-migration

      - name: Install Apple Certificate
        env:
          CERTIFICATES_P12: ${{ secrets.CERTIFICATES_P12 }}
          CERTIFICATES_P12_PASSWORD: ${{ secrets.CERTIFICATES_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$CERTIFICATES_P12" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$CERTIFICATES_P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH login.keychain-db

      - name: Verify certificate
        run: security find-identity -v -p codesigning $RUNNER_TEMP/app-signing.keychain-db

      - name: Install Provisioning Profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo -n "$PROVISIONING_PROFILE" | base64 --decode -o $PP_PATH

          PP_PLIST=$(/usr/bin/security cms -D -i $PP_PATH)
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$PP_PLIST")
          PP_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /dev/stdin <<< "$PP_PLIST")

          echo "Profile UUID: $PP_UUID"
          echo "Profile Name: $PP_NAME"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision

          sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = \"vpnfreecom\";/PROVISIONING_PROFILE_SPECIFIER = \"$PP_NAME\";/g" ios/Runner.xcodeproj/project.pbxproj

      - name: Install Network Extension Provisioning Profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_NETWORK_PROFILE }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_ne_pp.mobileprovision
          echo -n "$PROVISIONING_PROFILE" | base64 --decode -o $PP_PATH

          PP_PLIST=$(/usr/bin/security cms -D -i $PP_PATH)
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$PP_PLIST")
          PP_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /dev/stdin <<< "$PP_PLIST")

          echo "NE Profile UUID: $PP_UUID"
          echo "NE Profile Name: $PP_NAME"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision

          sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = \"vpnfreecomnetworkextension\";/PROVISIONING_PROFILE_SPECIFIER = \"$PP_NAME\";/g" ios/Runner.xcodeproj/project.pbxproj

      - name: Create .env file
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Clean project
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Strip alpha channel from app icon
        run: |
          sips -s format jpeg assets/launcher/icon.png --out $RUNNER_TEMP/icon_flat.jpg
          sips -s format png $RUNNER_TEMP/icon_flat.jpg --out assets/launcher/icon.png
          dart run flutter_launcher_icons

      - name: Build IPA
        run: |
          flutter build ipa \
            --release \
            --build-number=$(( ${{ github.run_number }} + 100 )) \
            --export-options-plist=ios/ExportOptions.plist \
            --dart-define-from-file=.env

      - name: Upload to App Store Connect
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file build/ios/ipa/*.ipa \
            --username "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APP_SPECIFIC_PASSWORD }}"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: build/ios/ipa/*.ipa

      - name: Clean up keychain
        if: ${{ always() }}
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db
